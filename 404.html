<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable — Répit Emergo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy: #001E55;
      --blue: #5B9BD5;
      --blue-light: #C5D8F0;
      --blue-pale: #E8F0FA;
      --sky: #B8D4EE;
      --gold: #D4A843;
      --cream: #F7F5F0;
      --white: #FFFFFF;
      --text: #1A1A2E;
      --text-mid: #3D4B6B;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(160deg, var(--blue-pale) 0%, var(--sky) 40%, var(--blue-light) 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      color: var(--text);
    }

    /* Floating background bubbles */
    .bubbles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .bubble {
      position: absolute;
      border-radius: 50%;
      opacity: 0.12;
      animation: float linear infinite;
    }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.12; }
      90% { opacity: 0.12; }
      100% { transform: translateY(-120px) rotate(360deg); opacity: 0; }
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 24px;
      max-width: 600px;
    }

    /* Logo */
    .logo-img {
      width: 200px;
      margin: 0 auto 32px;
      display: block;
      transition: transform 0.3s ease;
    }
    .logo-img:hover {
      transform: scale(1.05);
    }

    .error-code {
      font-size: 7rem;
      font-weight: 700;
      color: var(--navy);
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: -4px;
    }

    .error-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 12px;
    }

    .error-message {
      font-size: 1rem;
      color: var(--text-mid);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.25s ease;
      border: none;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--navy);
      color: var(--white);
    }
    .btn-primary:hover {
      background: #002B7A;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,30,85,0.3);
    }
    .btn-secondary {
      background: var(--white);
      color: var(--navy);
      border: 2px solid var(--blue-light);
    }
    .btn-secondary:hover {
      background: var(--blue-pale);
      border-color: var(--blue);
      transform: translateY(-2px);
    }
    .btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* Quick links */
    .quick-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .quick-link {
      font-size: 0.85rem;
      color: var(--navy);
      text-decoration: none;
      padding: 6px 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(4px);
      transition: all 0.2s ease;
    }
    .quick-link:hover {
      background: var(--white);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(0,30,85,0.1);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .error-code { font-size: 5rem; }
      .error-title { font-size: 1.2rem; }
      .logo-img { width: 140px; }
      .actions { flex-direction: column; align-items: center; }
    }

    /* Language switcher */
    .lang-switch {
      position: absolute;
      top: 20px;
      right: 24px;
      z-index: 2;
      padding: 6px 14px;
      border-radius: 8px;
      border: 1.5px solid var(--blue-light);
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(4px);
      font-family: 'Poppins', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--navy);
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    .lang-switch:hover {
      background: var(--white);
      border-color: var(--blue);
    }
  </style>
</head>
<body>

  <!-- Floating bubbles background -->
  <div class="bubbles" id="bubbles"></div>

  <!-- Language switch -->
  <a class="lang-switch" id="langSwitch" href="#" onclick="toggleLang(); return false;">EN</a>

  <div class="content">
    <!-- Logo Répit Emergo -->
    <a href="index.html">
      <img src="https://repitemergo.com/wp-content/uploads/2025/02/cropped-cropped-cropped-Repit_Emergo-Logotype_Horizontal_Bleu_Ciel-RGB.png" alt="Répit Emergo" class="logo-img">
    </a>

    <div class="error-code">404</div>

    <h1 class="error-title" id="title">Oups! Cette page n'existe pas</h1>
    <p class="error-message" id="message">
      La page que vous cherchez a peut-être été déplacée ou n'existe plus.
      Pas de panique, on vous ramène au bon endroit!
    </p>

    <div class="actions">
      <a href="index.html" class="btn btn-primary" id="btnHome">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span data-key="btnHome">Retour à l'accueil</span>
      </a>
      <a href="index.html#contact" class="btn btn-secondary" id="btnContact">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <span data-key="btnContact">Nous contacter</span>
      </a>
    </div>

    <div class="quick-links">
      <a href="index.html#services" class="quick-link" data-key="linkServices">Services de répit</a>
      <a href="emplois.html" class="quick-link" data-key="linkJobs">Emplois étudiants</a>
      <a href="renseignements.html" class="quick-link" data-key="linkInfo">Renseignements</a>
      <a href="index.html#member" class="quick-link" data-key="linkMember">Devenir membre</a>
      <a href="reve.html" class="quick-link" data-key="linkDream">Un rêve à réaliser</a>
    </div>
  </div>

  <script>
    // === Floating bubbles ===
    (function() {
      const container = document.getElementById('bubbles');
      const colors = ['#001E55', '#5B9BD5', '#D4A843', '#4A9A5B', '#C5D8F0'];
      for (let i = 0; i < 20; i++) {
        const b = document.createElement('div');
        b.className = 'bubble';
        const size = Math.random() * 60 + 20;
        b.style.width = size + 'px';
        b.style.height = size + 'px';
        b.style.left = Math.random() * 100 + '%';
        b.style.background = colors[Math.floor(Math.random() * colors.length)];
        b.style.animationDuration = (Math.random() * 15 + 10) + 's';
        b.style.animationDelay = (Math.random() * 10) + 's';
        container.appendChild(b);
      }
    })();

    // === Bilingual toggle ===
    const i18n = {
      fr: {
        title: "Oups! Cette page n'existe pas",
        message: "La page que vous cherchez a peut-être été déplacée ou n'existe plus. Pas de panique, on vous ramène au bon endroit!",
        btnHome: "Retour à l'accueil",
        btnContact: "Nous contacter",
        linkServices: "Services de répit",
        linkJobs: "Emplois étudiants",
        linkInfo: "Renseignements",
        linkMember: "Devenir membre",
        linkDream: "Un rêve à réaliser",
        langLabel: "EN"
      },
      en: {
        title: "Oops! This page doesn't exist",
        message: "The page you're looking for may have been moved or no longer exists. Don't worry, we'll get you back on track!",
        btnHome: "Back to home",
        btnContact: "Contact us",
        linkServices: "Respite services",
        linkJobs: "Student jobs",
        linkInfo: "Information",
        linkMember: "Become a member",
        linkDream: "A dream to fulfill",
        langLabel: "FR"
      }
    };

    let currentLang = 'fr';

    function toggleLang() {
      currentLang = currentLang === 'fr' ? 'en' : 'fr';
      const t = i18n[currentLang];
      document.getElementById('title').textContent = t.title;
      document.getElementById('message').textContent = t.message;
      document.getElementById('langSwitch').textContent = t.langLabel;
      document.querySelectorAll('[data-key]').forEach(el => {
        const key = el.getAttribute('data-key');
        if (t[key]) el.textContent = t[key];
      });
    }
  </script>
</body>
</html>
