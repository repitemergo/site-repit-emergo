<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banque d'activités — Répit Emergo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Emergo Brand Colors */
    --bleu-ciel:  #D2E6FF;
    --bleu-roi:   #001E55;
    --beige:      #F0EDE1;
    --jaune:      #FFEBB4;
    --vert:       #C8E1C8;
    --blanc:      #FFFFFF;

    /* Derived */
    --bg:         var(--bleu-ciel);
    --card:       var(--blanc);
    --text:       var(--bleu-roi);
    --muted:      #3d5a80;
    --border:     #d0d8e0;
    --shadow:     0 4px 20px rgba(0,30,85,.08);
    --radius:     16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', 'Calibri', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.65;
  }

  /* ===== HERO ===== */
  .hero {
    background: var(--bleu-ciel);
    color: var(--bleu-roi);
    text-align: center;
    padding: 2rem 1.5rem 2.5rem;
    position: relative;
    overflow: hidden;
    z-index: 1;
  }
  .hero-logo {
    position: relative;
    margin-bottom: 1rem;
  }
  .hero-logo img {
    height: 60px;
    width: auto;
    opacity: 1;
  }
  .hero::before {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    right: 0;
    height: 16px;
    background: repeating-linear-gradient(90deg,
      transparent 0px, transparent 12px,
      var(--bleu-ciel) 12px, var(--bleu-ciel) 14px);
    opacity: .3;
    pointer-events: none;
  }
  /* ===== ARTS & CRAFTS BACKGROUND ===== */
  .page-crafts {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .page-crafts .craft {
    position: absolute;
    opacity: .08;
  }
  /* Paint splashes — organic blobs */
  .splash {
    border-radius: 42% 58% 65% 35% / 55% 40% 60% 45%;
  }
  .sp1  { width: 200px; height: 180px; top: 2%;   left: -30px; background: var(--jaune); transform: rotate(15deg); }
  .sp2  { width: 160px; height: 140px; top: 18%;  right: -20px; background: var(--vert); border-radius: 55% 45% 38% 62% / 45% 60% 40% 55%; transform: rotate(-20deg); }
  .sp3  { width: 120px; height: 110px; top: 35%;  left: 5%;  background: var(--bleu-ciel); border-radius: 38% 62% 50% 50% / 60% 35% 65% 40%; opacity: .12; transform: rotate(30deg); }
  .sp4  { width: 180px; height: 160px; top: 52%;  right: 3%; background: var(--jaune); border-radius: 60% 40% 45% 55% / 40% 55% 45% 60%; transform: rotate(-10deg); }
  .sp5  { width: 140px; height: 130px; top: 70%;  left: -20px; background: var(--vert); border-radius: 45% 55% 60% 40% / 50% 45% 55% 50%; transform: rotate(25deg); }
  .sp6  { width: 100px; height: 90px;  top: 88%;  right: 8%; background: var(--bleu-ciel); border-radius: 52% 48% 42% 58% / 55% 42% 58% 45%; opacity: .1; transform: rotate(-15deg); }
  /* Stars — CSS clip-path */
  .star {
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
  }
  .st1 { width: 50px;  height: 50px;  top: 8%;   right: 12%; background: var(--jaune); transform: rotate(12deg); opacity: .12; }
  .st2 { width: 35px;  height: 35px;  top: 30%;  left: 25%;  background: #f0d8cc; transform: rotate(-8deg); opacity: .15; }
  .st3 { width: 45px;  height: 45px;  top: 55%;  right: 22%; background: var(--jaune); transform: rotate(20deg); opacity: .1; }
  .st4 { width: 30px;  height: 30px;  top: 75%;  left: 45%;  background: var(--vert); transform: rotate(-15deg); opacity: .13; }
  .st5 { width: 40px;  height: 40px;  top: 92%;  left: 15%;  background: var(--jaune); transform: rotate(5deg); opacity: .11; }
  /* Zigzag strips — like cut paper / washi tape */
  .zig {
    height: 12px;
    opacity: .06;
    background: repeating-linear-gradient(90deg, transparent, transparent 8px, currentColor 8px, currentColor 16px);
  }
  .z1 { width: 200px; top: 14%; left: 60%;  color: var(--bleu-roi); transform: rotate(3deg); }
  .z2 { width: 160px; top: 42%; right: 0;   color: var(--jaune); transform: rotate(-2deg); opacity: .1; }
  .z3 { width: 180px; top: 65%; left: 0;    color: var(--vert); transform: rotate(1.5deg); }
  .z4 { width: 140px; top: 85%; left: 55%;  color: #f0d8cc; transform: rotate(-3deg); opacity: .08; }
  /* Confetti dots */
  .dot {
    border-radius: 50%;
    opacity: .07;
  }
  .d1  { width: 18px; height: 18px; top: 6%;   left: 50%; background: var(--jaune); }
  .d2  { width: 12px; height: 12px; top: 12%;  left: 78%; background: var(--vert); }
  .d3  { width: 15px; height: 15px; top: 25%;  right: 35%; background: #f0d8cc; }
  .d4  { width: 10px; height: 10px; top: 33%;  left: 40%; background: var(--jaune); }
  .d5  { width: 20px; height: 20px; top: 47%;  left: 70%; background: var(--vert); opacity: .06; }
  .d6  { width: 14px; height: 14px; top: 60%;  right: 42%; background: var(--bleu-ciel); opacity: .1; }
  .d7  { width: 16px; height: 16px; top: 68%;  left: 30%; background: var(--jaune); }
  .d8  { width: 11px; height: 11px; top: 78%;  right: 18%; background: #f0d8cc; }
  .d9  { width: 13px; height: 13px; top: 84%;  left: 62%; background: var(--vert); }
  .d10 { width: 17px; height: 17px; top: 95%;  left: 42%; background: var(--jaune); opacity: .06; }
  /* Squiggly lines — like hand-drawn */
  .squig {
    height: 3px;
    opacity: .06;
    border-radius: 2px;
    background: var(--bleu-roi);
  }
  .sq1 { width: 100px; top: 20%; left: 3%;  transform: rotate(8deg); border-radius: 50%/100%; }
  .sq2 { width: 80px;  top: 48%; right: 5%; transform: rotate(-5deg); }
  .sq3 { width: 90px;  top: 73%; left: 8%;  transform: rotate(3deg); }

  .hero h1 {
    font-family: 'Trebuchet MS', 'Arial Black', sans-serif;
    font-size: clamp(1.6rem, 4.5vw, 2.6rem);
    font-weight: 700;
    position: relative;
    letter-spacing: -.5px;
  }
  .hero p {
    font-size: 1rem;
    opacity: .85;
    margin-top: .4rem;
    position: relative;
    font-weight: 300;
  }
  .stat-bar {
    display: flex;
    justify-content: center;
    gap: 1.2rem;
    margin-top: 1.5rem;
    position: relative;
    flex-wrap: wrap;
  }
  .stat {
    background: #fffdf7;
    border-radius: 4px;
    padding: .6rem 1.2rem;
    font-weight: 600;
    font-size: .85rem;
    color: var(--bleu-roi);
    position: relative;
    box-shadow: 2px 2px 0 rgba(0,30,85,.08);
    border: 1.5px dashed rgba(0,30,85,.12);
    transform: rotate(-1deg);
  }
  .stat:nth-child(2) { transform: rotate(1.5deg); }
  .stat:nth-child(3) { transform: rotate(-0.5deg); }
  .stat::before {
    content: '';
    position: absolute;
    top: -5px;
    left: 50%;
    transform: translateX(-50%);
    width: 30px;
    height: 10px;
    border-radius: 1px;
    opacity: .6;
  }
  .stat:nth-child(1)::before { background: var(--jaune); transform: translateX(-50%) rotate(2deg); }
  .stat:nth-child(2)::before { background: var(--vert); transform: translateX(-50%) rotate(-1deg); }
  .stat:nth-child(3)::before { background: #f0d8cc; transform: translateX(-50%) rotate(1.5deg); }
  .stat span {
    font-size: 1.3rem;
    font-weight: 700;
    display: block;
    text-align: center;
    line-height: 1.2;
  }
  .stat span { font-size: 1.3rem; display: block; color: var(--bleu-roi); }

  /* ===== FILTERS ===== */
  .filters {
    max-width: 1200px;
    margin: -1.5rem auto 0;
    padding: 0 1rem;
    position: relative;
    z-index: 2;
  }
  .filter-card {
    background: #fffdf7;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(180,160,130,.06) 28px, rgba(180,160,130,.06) 29px);
    border-radius: 4px;
    box-shadow: 2px 3px 0 rgba(0,30,85,.06), 0 1px 4px rgba(0,0,0,.08);
    padding: 1.25rem 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: .8rem;
    align-items: end;
    position: relative;
  }
  .filter-card::before {
    content: '';
    position: absolute;
    top: -6px;
    right: 25px;
    width: 60px;
    height: 14px;
    background: var(--bleu-ciel);
    opacity: .7;
    border-radius: 1px;
    transform: rotate(1deg);
  }
  .filter-group { flex: 1 1 150px; min-width: 130px; }
  .filter-group label {
    display: block;
    font-weight: 600;
    font-size: .75rem;
    color: var(--muted);
    margin-bottom: .3rem;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .filter-group select,
  .filter-group input {
    width: 100%;
    padding: .5rem .7rem;
    border: 1.5px dashed rgba(180,160,130,.4);
    border-radius: 4px;
    font-family: inherit;
    font-size: .9rem;
    background: rgba(240,237,225,.4);
    color: var(--bleu-roi);
    transition: border-color .2s, background .2s;
  }
  .filter-group select:focus,
  .filter-group input:focus {
    outline: none;
    border-color: var(--bleu-roi);
  }
  .result-count {
    text-align: center;
    padding: .75rem;
    font-weight: 500;
    color: var(--muted);
    font-size: .9rem;
  }
  .result-count strong { color: var(--bleu-roi); font-size: 1.15rem; }

  /* ===== GRID ===== */
  .grid {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 1rem 3rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
    gap: 1.1rem;
    position: relative;
    z-index: 1;
  }

  /* ===== CARD ===== */
  /* ===== ARTS & CRAFTS CARDS ===== */
  .card {
    background: #fffdf7;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(180,160,130,.07) 28px, rgba(180,160,130,.07) 29px),
      repeating-linear-gradient(90deg, transparent, transparent 28px, rgba(180,160,130,.05) 28px, rgba(180,160,130,.05) 29px);
    border-radius: 4px 4px 3px 5px;
    box-shadow:
      2px 3px 0 rgba(0,30,85,.06),
      0 1px 4px rgba(0,0,0,.08);
    overflow: visible;
    transition: transform .25s, box-shadow .25s;
    cursor: pointer;
    border: none;
    position: relative;
  }
  .card-tape {
    position: absolute;
    top: -6px;
    height: 14px;
    border-radius: 1px;
    opacity: .65;
    z-index: 2;
    pointer-events: none;
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: repeating-linear-gradient(90deg,
      transparent, transparent 4px,
      rgba(180,160,130,.15) 4px, rgba(180,160,130,.15) 5px);
  }
  .card:hover {
    transform: translateY(-4px) rotate(0.3deg);
    box-shadow:
      3px 6px 0 rgba(0,30,85,.08),
      0 4px 16px rgba(0,0,0,.1);
  }
  .card-accent {
    height: 0;
    overflow: hidden;
  }
  .card-body { padding: 1.2rem 1.25rem .9rem; }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: .35rem;
    margin-bottom: .65rem;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: .25rem;
    padding: .2rem .55rem;
    border-radius: 3px;
    font-size: .72rem;
    font-weight: 600;
    line-height: 1.5;
    border: 1.5px dashed rgba(0,0,0,.12);
    position: relative;
  }
  .tag-saison { background: rgba(210,230,255,.6); color: var(--bleu-roi); border-color: rgba(0,30,85,.15); }
  .tag-style  { background: rgba(200,225,200,.6); color: #1a5a2a; border-color: rgba(26,90,42,.15); }
  .tag-autonomie { background: rgba(255,235,180,.6); color: #6b5300; border-color: rgba(107,83,0,.15); }
  .tag-lieu   { background: rgba(240,216,204,.6); color: #5a2d1a; border-color: rgba(90,45,26,.12); }
  .tag-duree  { background: rgba(220,230,240,.6); color: #2c3e50; border-color: rgba(44,62,80,.12); }
  .tag-comp   { background: rgba(232,218,239,.6); color: #4a235a; border-color: rgba(74,35,90,.12); }

  .card h3 {
    font-family: 'Trebuchet MS', 'Arial Black', sans-serif;
    font-size: 1.12rem;
    font-weight: 700;
    margin-bottom: .35rem;
    color: var(--bleu-roi);
    position: relative;
    display: inline-block;
  }
  .card h3::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--jaune);
    opacity: .5;
    border-radius: 2px;
  }
  .card-desc {
    font-size: .84rem;
    color: var(--muted);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.55;
  }
  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: .5rem;
    margin-top: .65rem;
    font-size: .78rem;
    color: var(--muted);
    padding-top: .5rem;
    border-top: 1.5px dashed rgba(180,160,130,.25);
  }
  .card-meta span {
    display: inline-flex;
    align-items: center;
    gap: .2rem;
  }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,30,85,.4);
    backdrop-filter: blur(4px);
    z-index: 100;
    justify-content: center;
    align-items: start;
    padding: 2rem 1rem;
    overflow-y: auto;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #fffdf7;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(180,160,130,.06) 28px, rgba(180,160,130,.06) 29px);
    border-radius: 4px;
    max-width: 700px;
    width: 100%;
    box-shadow:
      3px 4px 0 rgba(0,30,85,.08),
      0 12px 40px rgba(0,0,0,.15);
    animation: slideUp .3s ease;
    margin: auto;
    position: relative;
  }
  .modal::before {
    content: '';
    position: absolute;
    top: -8px;
    left: 30px;
    width: 70px;
    height: 16px;
    background: var(--jaune);
    opacity: .7;
    border-radius: 1px;
    transform: rotate(-1deg);
    z-index: 2;
  }
  .modal::after {
    content: '';
    position: absolute;
    top: -7px;
    right: 60px;
    width: 55px;
    height: 14px;
    background: var(--vert);
    opacity: .6;
    border-radius: 1px;
    transform: rotate(1.5deg);
    z-index: 2;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .modal-accent {
    height: 0;
    overflow: hidden;
  }
  .modal-content { padding: 1.75rem 1.75rem 1.5rem; }
  .modal-content h2 {
    font-family: 'Trebuchet MS', 'Arial Black', sans-serif;
    font-size: 1.45rem;
    color: var(--bleu-roi);
    margin-bottom: .4rem;
    position: relative;
    display: inline-block;
  }
  .modal-content h2::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: var(--jaune);
    opacity: .45;
    border-radius: 2px;
  }
  .modal-section {
    margin-top: 1.1rem;
    padding-top: .8rem;
    border-top: 1.5px dashed rgba(180,160,130,.25);
  }
  .modal-section:first-of-type { border-top: none; padding-top: 0; }
  .modal-section h4 {
    font-size: .78rem;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--bleu-roi);
    margin-bottom: .25rem;
    font-weight: 700;
    opacity: .7;
  }
  .modal-section p {
    font-size: .9rem;
    color: var(--text);
    line-height: 1.7;
  }
  .modal-close {
    position: absolute;
    top: .75rem;
    right: .75rem;
    background: var(--beige);
    border: 1.5px dashed rgba(180,160,130,.3);
    width: 34px;
    height: 34px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--bleu-roi);
    transition: background .2s;
    z-index: 5;
  }
  .modal-close:hover { background: var(--bleu-ciel); }

  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 1.05rem;
  }

  /* ===== FOOTER ===== */
  .footer {
    background: var(--bleu-roi);
    color: rgba(255,255,255,.6);
    text-align: center;
    padding: 1.25rem;
    font-size: .8rem;
    position: relative;
    z-index: 1;
  }
  .footer a { color: var(--bleu-ciel); text-decoration: none; }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .stat-bar { gap: .6rem; }
    .filter-card { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- Arts & crafts background decorations -->
<div class="page-crafts">
  <!-- Paint splashes -->
  <div class="craft splash sp1"></div><div class="craft splash sp2"></div><div class="craft splash sp3"></div>
  <div class="craft splash sp4"></div><div class="craft splash sp5"></div><div class="craft splash sp6"></div>
  <!-- Stars -->
  <div class="craft star st1"></div><div class="craft star st2"></div><div class="craft star st3"></div>
  <div class="craft star st4"></div><div class="craft star st5"></div>
  <!-- Zigzag strips -->
  <div class="craft zig z1"></div><div class="craft zig z2"></div><div class="craft zig z3"></div><div class="craft zig z4"></div>
  <!-- Confetti dots -->
  <div class="craft dot d1"></div><div class="craft dot d2"></div><div class="craft dot d3"></div><div class="craft dot d4"></div>
  <div class="craft dot d5"></div><div class="craft dot d6"></div><div class="craft dot d7"></div><div class="craft dot d8"></div>
  <div class="craft dot d9"></div><div class="craft dot d10"></div>
  <!-- Squiggly lines -->
  <div class="craft squig sq1"></div><div class="craft squig sq2"></div><div class="craft squig sq3"></div>
</div>

<div class="hero">
  <div class="hero-logo"><img src="images/Repit_Emergo-Logotype_Horizontal_Bleu_Ciel-RGB(C).png" alt="R&eacute;pit Emergo"></div>
  <h1>Banque d'activit&eacute;s pour tous!</h1>
  <p>Des id&eacute;es adapt&eacute;es pour chaque saison, chaque style, chaque campeur</p>
  <div class="stat-bar">
    <div class="stat"><span id="totalCount">183</span> activit&eacute;s</div>
    <div class="stat"><span>15</span> styles</div>
    <div class="stat"><span>4</span> saisons</div>
  </div>
</div>

<div class="filters">
  <div class="filter-card">
    <div class="filter-group">
      <label>Recherche</label>
      <input type="text" id="searchInput" placeholder="Mot-cl&eacute;...">
    </div>
    <div class="filter-group">
      <label>Saison</label>
      <select id="filterSaison"><option value="">Toutes les saisons</option></select>
    </div>
    <div class="filter-group">
      <label>Style</label>
      <select id="filterStyle"><option value="">Tous les styles</option></select>
    </div>
    <div class="filter-group">
      <label>Autonomie</label>
      <select id="filterAutonomie"><option value="">Tous les niveaux</option></select>
    </div>
    <div class="filter-group">
      <label>Lieu</label>
      <select id="filterLieu"><option value="">Tous les lieux</option></select>
    </div>
    <div class="filter-group">
      <label>Dur&eacute;e</label>
      <select id="filterDuree"><option value="">Toutes les dur&eacute;es</option></select>
    </div>
    <div class="filter-group">
      <label>Comp&eacute;tence</label>
      <select id="filterCompetence"><option value="">Toutes</option></select>
    </div>
  </div>
  <div class="result-count"><strong id="visibleCount">151</strong> activit&eacute;s trouv&eacute;es</div>
</div>

<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">&times;</button>
    <div class="modal-accent" id="modalAccent"></div>
    <div class="modal-content" id="modalContent"></div>
  </div>
</div>

<footer class="footer">
  R&eacute;pit Emergo &mdash; Service de r&eacute;pit sp&eacute;cialis&eacute; en autisme

s": "1- Pour avec RAR trouver un mini-jeu quand les combattants se rencontrent, si il perd retourner à sa base", "notes": "", "fiche": "1- style Grandeur Nature", "style_norm": "Grand jeu", "saison_norm": "Toutes", "lieu_norm": "Extérieur", "duree_norm": "1 période", "competence_norm": "Coopération"}, {"saison": "Toutes", "lieu": "Extérieur (tout le site)", "style": "Jeu coopératif", "nom": "Parade de mouvements", "description": "Les moniteurs et les campeurs forment une file.L'animatrice se place au devant de la file et commence à marcher. Les participants doivent suivre le meneur. Celui-ci peut, au fur et à mesure, instaurer de nouveaux mouvements(genous fléchis, sauts de kangourous ou de grenouilles, marche de côté ou à reculons, course, battre des bras, sur une jambe, etc.) en les citant. Les campeurs doivent imiter le nouveau mouvement tout en continuant à avancer et en gardant la file.", "application": "En groupe", "autonomie": "Soutien partiel", "preparation": "Dégager un espace suffisant", "materiel": "Aucun matériel nécessaire", "duree": "1/2 à 1 période", "competence": "Expression corporelle et coordination", "adaptations": "1- Selon la capacité d'attention des campeurs, on peut arrêter d'avancer lorsqu'il faut instaurer un nouveau mouvement et le faire devant tous les campeurs avant de reprendre la file. Il peut être utile de présenter des pictogrammes représentant la consigne à excuter. La complexité des mouvements dépend bien sur des capacités des campeurs. 2- Cette activité peut  être utilisée pour se défouler et dépenser de l'énergie.Elle peut aussi être faite en restant sur place. L'animatrice est ainsi en face de tout le monde pour faire les mouvements et les campeurs doivent l'imiter.", "notes": "", "fiche": "1- jeu d'expression (théâtre, mime) 2- soirée dansante 3- work out", "style_norm": "Jeu coopératif", "saison_norm": "Toutes", "lieu_norm": "Extérieur", "duree_norm": "½ à 1 période", "competence_norm": "Expression & communication"}, {"saison": "Toutes", "lieu": "Extérieur (tout le site)", "style": "Sensoriel", "nom": "Parachute senso", "description": "Le parachute sert de tapis volant. On peut faire plusieurs jeux avec le parachute en gardant toujours le thème du tapis volant. Les campeurs peuvent s'asseoir au centre en les moniteurs agitent le parachute autour d'eux. L'illusion est vraiment intéressante. On peut aussi déplacer des objets en faisant onduler le tapis volant et en se déplaçant. Utiliser des luge pour tirer les campeurs dans le gazon est une autre alternative à cette activité.", "application": "En groupe", "autonomie": "Tous", "preparation": "Sortir le parachute, préparer les balles", "materiel": "parachute, balles", "duree": "1 période", "competence": "Exploration sensorielle et coopération", "adaptations": "Les campeurs peuvent facilement faire onduler le parachute. On peut aller dessous, former une mongolfière, tourner,etc.", "notes": "Le parachute est souvent une activité appréciée de tous. Les couleurs vives accrochent les campeurs et le mouvement est très stimulant.", "fiche": "", "style_norm": "Sensoriel", "saison_norm": "Toutes", "lieu_norm": "Extérieur", "duree_norm": "1 période", "competence_norm": "Exploration sensorielle"}, {"saison": "Toutes", "lieu": "Extérieur (tout le site)", "style": "Sport", "nom": "Le chemin de fer", "description": "1- Les campeurs forment une ligne debout, les jambes écartées, les uns à la suite des autres. Le premier joueur de la ligne a un ballon (ou autre objet) entre les mains. 2- Au signal, le joueur passe le ballon au suivant entre ses jambes, ainsi de suite jusqu'à ce que le dernier joueur le reçoive. 3- À ce moment, ce joueur crie couché, et tout le monde doit se coucher sur le sol. 4- Le campeur enjambe alors ceux qui sont couchés sur le sol pour retourner au début de la file. Lorsqu'il y est rendu, il crie debout, et tout le monde doit se lever. Ainsi de suite jusqu'à ce que le joueur qui était au début de la file en premier y soit de retour.", "application": "En groupe", "autonomie": "Semi-autonome", "preparation": "Préparer le ballon, dégager un espace en ligne droite", "materiel": "1 objet tennant dans des mains (style ballon)", "duree": "1/2 à 1 période, il peut être intérressant de trouver des variables", "competence": "Coopération et motricité globale", "adaptations": "1- Au lieu de se passer un objet ou peut faire un bruit chacun notre tour et faire un mouvement de danse quand le bruit est arrivé à la fin de la ligne 2- On peut permettre au joueur de passer à côté des campeurs couchés au lieu de les enjamber. 3-Ce peut être un moniteur qui donne les consignes couché et debout. 4- Les joueurs sont les uns à côté des autres. Le premier joueur passe le ballon au suivant en faisant une rotation du bassin. Une fois le ballon passé, le joueur doit aller se placer à la fin de la file pour qu'il y ait toujours quelqu'un à qui passer le ballon. On joue jusqu'à ce que le ballon arrive au bout de la file et qu'il n'y ait personne qui se soit rendu pour l'attraper.", "notes": "Dans la neige!!! 2- Les  campeurs apprennent beaucoup mieux avec l'exemple, donc il pourrait être pertinent de faire une démonstration pour qu'il associe les mots aux mouvements, ce sera ainsi plus facile à intégrer. On peut aussi se placer avec eux pour faire les premiers mouvements pour qu'ils y prennent l'habitude et puissent ainsi les refaire seul par la suite.", "fiche": "", "style_norm": "Sport", "saison_norm": "Toutes", "lieu_norm": "Extérieur", "duree_norm": "½ à 1 période", "competence_norm": "Motricité globale"}, {"saison": "Toutes", "lieu": "Intérieur Boubou", "style": "Autre", "nom": "Chaise musicale", "description": "Les campeurs marchent ou dansent autour des chaises ou tapis au son de la musique. Quand la musique arrête, chacun doit trouver une place. Celui qui n'en a pas est éliminé (ou rejoint l'équipe des DJ!).", "application": "En groupe", "autonomie": "Tous", "preparation": "Placer les chaises ou tapis en cercle, préparer la musique", "materiel": "chaises ou tapis, musique", "duree": "1/2 à 1 période", "competence": "Écoute active et réactivité", "adaptations": "chaises ou tapis ou cerceaux", "notes": "", "fiche": "", "style_norm": "Autre", "saison_norm": "Toutes", "lieu_norm": "Intérieur", "duree_norm": "½ à 1 période", "competence_norm": "Autre"}, {"nom": "Capteur de rêves", "style": "Bricolage", "style_norm": "Bricolage", "saison": "Toutes", "saison_norm": "Toutes", "lieu": "Intérieur Boubou", "description": "Fabriquer un capteur de rêves : 1- Enrouler de la laine autour d'un cercle de carton ou d'un anneau métallique. 2- Tisser un filet à l'intérieur en croisant la laine de point en point. 3- Décorer avec des plumes, des perles et des rubans.", "application": "Individuel", "autonomie": "Soutien partiel", "preparation": "Préparer les anneaux, couper la laine, préparer des modèles", "materiel": "Anneaux en carton ou métal, laine, plumes, perles, rubans, ciseaux, colle", "duree": "1 période", "competence": "Motricité fine et concentration", "adaptations": "1- Le moniteur peut préparer la base tissée pour les campeurs qui ont de la difficulté, le campeur n'a plus qu'à décorer. 2- On peut utiliser un cerceau de broderie pour plus de solidité.", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "1 période", "competence_norm": "Motricité fine"}, {"nom": "Masques vénitiens", "style": "Bricolage", "style_norm": "Bricolage", "saison": "Toutes", "saison_norm": "Toutes", "lieu": "Intérieur Boubou", "description": "Créer un masque décoratif : 1- Choisir un masque blanc prédécoupé en carton. 2- Décorer avec de la peinture, des paillettes, des plumes et du tissu. 3- Attacher un bâtonnet ou un élastique pour le porter.", "application": "Individuel", "autonomie": "Soutien partiel", "preparation": "Prédécouper les masques dans du carton rigide, préparer les décorations", "materiel": "Masques en carton prédécoupés, peinture, paillettes, plumes, colle, bâtonnets, élastiques", "duree": "1 période", "competence": "Créativité et motricité fine", "adaptations": "1- À la thématique (super-héros, animaux, personnages). 2- Peut être suivi d'un défilé ou d'une séance photo.", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "1 période", "competence_norm": "Motricité fine"}, {"nom": "Cadre photo décoré", "style": "Bricolage", "style_norm": "Bricolage", "saison": "Toutes", "saison_norm": "Toutes", "lieu": "Intérieur Boubou", "description": "Fabriquer un cadre photo souvenir : 1- Coller des bâtons de popsicle en carré pour former un cadre. 2- Décorer avec de la peinture, des billes, des coquillages ou des boutons. 3- Coller une photo du campeur au centre.", "application": "Individuel", "autonomie": "Soutien partiel", "preparation": "Imprimer les photos des campeurs, préparer les bâtons de popsicle", "materiel": "Bâtons de popsicle, colle chaude, photos imprimées, décorations variées (boutons, coquillages, peinture)", "duree": "1 période", "competence": "Motricité fine et créativité", "adaptations": "Peut être un souvenir de camp à ramener à la maison. Excellent en fin de séjour.", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "1 période", "competence_norm": "Motricité fine"}, {"nom": "Instruments de musique recyclés", "style": "Bricolage", "style_norm": "Bricolage", "saison": "Toutes", "saison_norm": "Toutes", "lieu": "Intérieur Boubou", "description": "Fabriquer des instruments de musique à partir de matériaux recyclés : maracas avec des bouteilles remplies de riz, tambour avec un pot de conserve et un ballon, guitare avec une boîte et des élastiques. Décorer et personnaliser chaque instrument.", "application": "Individuel", "autonomie": "Soutien partiel", "preparation": "Rassembler les contenants recyclés, préparer le riz et les élastiques", "materiel": "Bouteilles vides, riz ou lentilles, boîtes de conserve, ballons, boîtes de mouchoirs, élastiques, ruban adhésif, décorations", "duree": "1 période", "competence": "Créativité et exploration sensorielle", "adaptations": "1- Après la fabrication, on peut faire un petit concert tous ensemble. 2- Les maracas fonctionnent aussi comme jouet sensoriel.", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "1 période", "competence_norm": "Exploration sensorielle"}, {"nom": "Totem collectif", "style": "Bricolage", "style_norm": "Bricolage", "saison": "Toutes", "saison_norm": "Toutes", "lieu": "Intérieur ou extérieur", "description": "Construire un totem de groupe : 1- Chaque campeur décore une boîte de carton selon la thématique. 2- On empile les boîtes les unes sur les autres pour créer un grand totem. 3- On peut y ajouter un visage, des bras et des accessoires.", "application": "En groupe", "autonomie": "Soutien partiel", "preparation": "Rassembler des boîtes de carton de tailles variées", "materiel": "Boîtes de carton, peinture, papier de construction, colle, ciseaux, ruban adhésif", "duree": "1 à 2 périodes", "competence": "Travail d'équipe et créativité", "adaptations": "1- Chaque boîte peut représenter un campeur ou un personnage. 2- Peut devenir la mascotte du camp.", "notes": "", "fiche": "", "lieu_norm": "Intérieur ou extérieur", "duree_norm": "1-2 périodes", "competence_norm": "Créativité"}, {"nom": "Bijoux en perles", "style": "Bricolage", "style_norm": "Bricolage", "saison": "Toutes", "saison_norm": "Toutes", "lieu": "Intérieur Boubou", "description": "Enfiler des perles sur un fil ou un cure-pipe pour créer des bracelets, colliers ou porte-clés. On peut suivre un modèle de couleurs ou laisser libre cours à la créativité.", "application": "Individuel", "autonomie": "Soutien partiel", "preparation": "Trier les perles par couleur, couper les fils", "materiel": "Perles de différentes tailles et couleurs, fils élastiques ou cure-pipes, ciseaux, fermoirs", "duree": "1 période", "competence": "Motricité fine et concentration", "adaptations": "1- Pour Émergence, utiliser de grosses perles et des cure-pipes rigides. 2- On peut faire un bracelet d'amitié entre moniteur et campeur.", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "1 période", "competence_norm": "Motricité fine"}, {"nom": "Slime maison", "style": "Expérience", "style_norm": "Expérience", "saison": "Toutes", "saison_norm": "Toutes", "lieu": "Intérieur Boubou", "description": "Fabriquer du slime : 1- Verser la colle blanche dans un bol. 2- Ajouter du colorant alimentaire. 3- Mélanger en ajoutant lentement la solution de contact. 4- Pétrir jusqu'à obtenir la consistance désirée. Le slime est prêt à être manipulé!", "application": "Individuel", "autonomie": "Tous", "preparation": "Préparer le matériel par poste, protéger les surfaces", "materiel": "Colle blanche, solution pour lentilles de contact (avec acide borique), bicarbonate de soude, colorant alimentaire, bols, cuillères", "duree": "1 période", "competence": "Exploration sensorielle et méthode scientifique", "adaptations": "1- On peut ajouter des paillettes, des billes de styromousse ou des petits objets. 2- Pour les campeurs qui n'aiment pas se salir, fournir des gants.", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "1 période", "competence_norm": "Observation & science"}, {"nom": "Fusée bicarbonate", "style": "Expérience", "style_norm": "Expérience", "saison": "Toutes", "saison_norm": "Toutes", "lieu": "Extérieur (tout le site)", "description": "Créer une fusée avec une réaction chimique : 1- Remplir un pot de pellicule photo (ou petit contenant) avec du vinaigre au tiers. 2- Envelopper du bicarbonate de soude dans un petit papier. 3- Déposer le papier dans le pot, fermer rapidement et retourner. 4- Reculer et attendre le décollage!", "application": "En groupe", "autonomie": "Soutien partiel", "preparation": "Préparer les contenants, mesurer le vinaigre et le bicarbonate", "materiel": "Petits contenants avec couvercle qui se clipse, vinaigre, bicarbonate de soude, papier essuie-tout", "duree": "1 période", "competence": "Observation et méthode scientifique", "adaptations": "1- Le moniteur doit superviser la fermeture du contenant. 2- Attention à ne pas viser des personnes! 3- Peut être intégré à un thème spatial.", "notes": "", "fiche": "", "lieu_norm": "Extérieur", "duree_norm": "1 période", "competence_norm": "Observation & science"}, {"nom": "Lampe à lave maison", "style": "Expérience", "style_norm": "Expérience", "saison": "Toutes", "saison_norm": "Toutes", "lieu": "Intérieur Boubou", "description": "Fabriquer une lampe à lave : 1- Remplir une bouteille transparente aux 3/4 d'huile végétale. 2- Ajouter de l'eau colorée avec du colorant alimentaire. 3- Casser un comprimé effervescent et le déposer dans la bouteille. 4- Observer les bulles colorées monter et descendre!", "application": "Individuel", "autonomie": "Semi-autonome", "preparation": "Préparer les bouteilles et l'eau colorée", "materiel": "Bouteilles transparentes, huile végétale, eau, colorant alimentaire, comprimés effervescents (type Alka-Seltzer)", "duree": "1/2 période", "competence": "Observation et méthode scientifique", "adaptations": "1- Peut être fait dans le noir avec une lampe de poche en dessous pour un effet spectaculaire. 2- Les campeurs peuvent choisir leurs couleurs.", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "½ période", "competence_norm": "Observation & science"}, {"nom": "Pâte à modeler maison", "style": "Expérience", "style_norm": "Expérience", "saison": "Toutes", "saison_norm": "Toutes", "lieu": "Intérieur Boubou", "description": "Fabriquer sa propre pâte à modeler : 1- Mélanger la farine, le sel et la crème de tartre. 2- Ajouter l'eau et l'huile puis mélanger. 3- Chauffer à feu doux en remuant jusqu'à formation d'une boule. 4- Laisser refroidir puis pétrir. On peut ajouter du colorant alimentaire pour différentes couleurs.", "application": "En groupe", "autonomie": "Tous", "preparation": "Mesurer les ingrédients, préparer les postes", "materiel": "Farine, sel, crème de tartre, eau, huile végétale, colorant alimentaire, casserole, cuillère en bois", "duree": "1 période", "competence": "Autonomie et exploration sensorielle", "adaptations": "1- Les campeurs peuvent ensuite sculpter avec la pâte fabriquée. 2- On peut ajouter des huiles essentielles pour un aspect sensoriel olfactif.", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "1 période", "competence_norm": "Exploration sensorielle"}, {"nom": "Brochettes de fruits", "style": "Cuisine", "style_norm": "Cuisine", "saison": "Été", "saison_norm": "Été", "lieu": "Intérieur Boubou", "description": "Préparer des brochettes de fruits frais : 1- Couper les fruits en morceaux. 2- Enfiler sur des brochettes en bois en alternant les couleurs. 3- Optionnel : tremper dans du chocolat fondu ou du yogourt.", "application": "Individuel", "autonomie": "Tous", "preparation": "Laver et couper les fruits, préparer les brochettes", "materiel": "Fruits variés (fraises, raisins, melon, banane, ananas), brochettes en bois, chocolat ou yogourt (optionnel), assiettes", "duree": "1/2 période", "competence": "Autonomie et cuisine", "adaptations": "1- Le moniteur peut précouper les fruits. 2- Vérifier les allergies alimentaires! 3- Peut être une collation d'été.", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "½ période", "competence_norm": "Autonomie & cuisine"}, {"nom": "Pizza sur pain naan", "style": "Cuisine", "style_norm": "Cuisine", "saison": "Toutes", "saison_norm": "Toutes", "lieu": "Intérieur Boubou", "description": "Chaque campeur garnit son propre pain naan avec de la sauce tomate, du fromage et les garnitures de son choix. Les pizzas sont ensuite passées au four.", "application": "Individuel", "autonomie": "Semi-autonome", "preparation": "Achats, précouper les garnitures, préchauffer le four", "materiel": "Pains naan, sauce tomate, fromage râpé, garnitures variées (pepperoni, légumes, olives), plaques de cuisson", "duree": "1 période (incluant cuisson et dégustation)", "competence": "Autonomie et cuisine", "adaptations": "1- Vérifier les allergies et intolérances. 2- Peut être un repas thématique (pizza party). 3- Pour Émergence, préparer les ingrédients en portions individuelles.", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "1 période", "competence_norm": "Autonomie & cuisine"}, {"nom": "Smoothies colorés", "style": "Cuisine", "style_norm": "Cuisine", "saison": "Été", "saison_norm": "Été", "lieu": "Intérieur Boubou", "description": "Préparer des smoothies de différentes couleurs : 1- Choisir ses fruits et son liquide de base (lait, jus). 2- Mettre dans le mélangeur avec du yogourt. 3- Mélanger jusqu'à consistance lisse. 4- Déguster!", "application": "En groupe", "autonomie": "Tous", "preparation": "Laver et couper les fruits, préparer les verres", "materiel": "Fruits variés (bananes, fraises, bleuets, mangue), yogourt, lait ou jus, mélangeur, verres, pailles", "duree": "1/2 période", "competence": "Autonomie et cuisine", "adaptations": "1- Vérifier allergies (produits laitiers, fruits). 2- Chaque campeur peut choisir ses ingrédients. 3- On peut faire un arc-en-ciel de couleurs en superposant les couches.", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "½ période", "competence_norm": "Autonomie & cuisine"}, {"nom": "Rallye photo", "style": "Grand jeu", "style_norm": "Grand jeu", "saison": "Toutes", "saison_norm": "Toutes", "lieu": "Extérieur (tout le site)", "description": "Les équipes reçoivent une liste de photos à prendre (un arbre tordu, quelque chose de bleu, un insecte, une pose de groupe drôle...). Ils doivent parcourir le site pour compléter le plus de photos possibles dans le temps imparti.", "application": "En groupe", "autonomie": "Semi-autonome", "preparation": "Préparer la liste des photos, charger les appareils photo ou tablettes", "materiel": "Appareils photo ou tablettes, liste de défis photo imprimée, chronomètre", "duree": "1 période", "competence": "Coopération et observation", "adaptations": "1- Pour Émergence, simplifier la liste avec des images de référence. 2- Les photos peuvent ensuite être affichées ou montrées en groupe.", "notes": "", "fiche": "", "lieu_norm": "Extérieur", "duree_norm": "1 période", "competence_norm": "Observation & science"}, {"nom": "Course à obstacles", "style": "Grand jeu", "style_norm": "Grand jeu", "saison": "Toutes", "saison_norm": "Toutes", "lieu": "Extérieur (tout le site)", "description": "Parcours d'obstacles adapté : ramper sous des cordes, sauter par-dessus des cônes, slalomer entre des piquets, lancer un ballon dans un cerceau, traverser un tunnel de draps... Chaque station a un niveau de difficulté adapté.", "application": "En groupe", "autonomie": "Semi-autonome", "preparation": "Monter le parcours, tester chaque station", "materiel": "Cordes, cônes, cerceaux, balles, draps, chaises, ruban adhésif de couleur, chronomètre", "duree": "1 période", "competence": "Motricité globale et coopération", "adaptations": "1- Adapter chaque station au niveau du campeur. 2- Peut se faire en tandem moniteur-campeur. 3- On peut chronométrer ou simplement s'amuser sans compétition.", "notes": "", "fiche": "", "lieu_norm": "Extérieur", "duree_norm": "1 période", "competence_norm": "Motricité globale"}, {"nom": "Jeu de piste sensoriel", "style": "Grand jeu", "style_norm": "Grand jeu", "saison": "Toutes", "saison_norm": "Toutes", "lieu": "Extérieur (tout le site)", "description": "Un jeu de piste où chaque station sollicite un sens différent : toucher des textures les yeux fermés, identifier des odeurs, goûter des aliments, écouter des sons de la nature, observer des détails. Chaque défi réussi donne un indice pour trouver le trésor final.", "application": "En groupe", "autonomie": "Semi-autonome", "preparation": "Préparer les stations sensorielles, cacher les indices et le trésor", "materiel": "Boîtes à textures, petits pots d'épices, aliments à goûter, enregistrements sonores, loupes, indices impri rifier la météo, préparer le matériel d'étoiles phosphorescentes", "materiel": "Couvertures, lampe de poche, carte du ciel imprimée, étoiles phosphorescentes et carton (optionnel)", "duree": "1 période", "competence": "Observation et découverte", "adaptations": "1- Parfait pour les longues soirées d'été. 2- Si le ciel est couvert, on peut projeter un planétarium intérieur avec un projecteur.", "notes": "", "fiche": "", "lieu_norm": "Extérieur", "duree_norm": "1 période", "competence_norm": "Observation & science"}, {"nom": "Balançoire et causette", "description": "S'installer sur les balançoires ou le hamac avec son campeur. Le mouvement régulier de la balançoire est apaisant et favorise les échanges. On peut se balancer en silence, chanter doucement ou discuter.", "lieu": "Extérieur (tout le site)", "application": "Individuel", "autonomie": "Soutien partiel", "preparation": "Aucune", "materiel": "Balançoire ou hamac disponible sur le site", "duree": "Variable (10-30 min)", "competence": "Régulation sensorielle et lien de confiance", "adaptations": "1- Certains campeurs préfèrent être poussés, d'autres se balancent seuls. 2- Le hamac peut être préféré pour un enveloppement plus contenu. 3- Respecter le besoin de silence.", "style": "Temps libres", "style_norm": "Temps libres", "saison": "Toutes", "saison_norm": "Toutes", "notes": "", "fiche": "", "lieu_norm": "Extérieur", "duree_norm": "Courte (< 30 min)", "competence_norm": "Exploration sensorielle"}, {"nom": "Coin lecture", "description": "Lire un livre ensemble ou chacun de son côté dans un endroit calme. Le moniteur peut lire à voix haute, le campeur peut feuilleter un imagier, un livre de cherche-et-trouve ou un album préféré qu'il a apporté de la maison.", "lieu": "Intérieur Boubou", "application": "Individuel", "autonomie": "Tous", "preparation": "Aucune (prévoir une sélection de livres accessibles)", "materiel": "Livres imagés, albums, cherche-et-trouve, coussins ou couverture", "duree": "Variable (10-30 min)", "competence": "Détente et partage", "adaptations": "1- Livres avec textures ou sons pour Émergence. 2- Livres d'intérêts spécifiques du campeur. 3- On peut aussi écouter un livre audio.", "style": "Temps libres", "style_norm": "Temps libres", "saison": "Toutes", "saison_norm": "Toutes", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "Courte (< 30 min)", "competence_norm": "Régulation & détente"}, {"nom": "Coloriage libre", "description": "Le campeur choisit un dessin à colorier (mandalas, personnages, scènes) ou dessine librement. Le moniteur peut colorier à côté de lui. Activité calme et prévisible, parfaite pour la régulation après une période stimulante.", "lieu": "Intérieur Boubou", "application": "Individuel", "autonomie": "Tous", "preparation": "Avoir des feuilles et crayons disponibles", "materiel": "Feuilles à colorier imprimées, feuilles blanches, crayons de couleur, feutres, crayons de cire", "duree": "Variable (15-45 min)", "competence": "Motricité fine et régulation émotionnelle", "adaptations": "1- Mandalas pour un effet apaisant. 2- Dessins liés aux intérêts du campeur (trains, dinosaures, animaux). 3- Gros crayons pour campeurs avec motricité réduite.", "style": "Temps libres", "style_norm": "Temps libres", "saison": "Toutes", "saison_norm": "Toutes", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "½ période", "competence_norm": "Motricité fine"}, {"nom": "Casse-tête", "description": "Faire un casse-tête adapté au niveau du campeur. Peut être un puzzle traditionnel, un casse-tête en bois, un cube Rubik simplifié ou un jeu d'encastrement. L'activité est prévisible et structurée, ce que beaucoup de campeurs TSA apprécient.", "lieu": "Intérieur Boubou", "application": "Individuel", "autonomie": "Soutien partiel", "preparation": "Avoir des casse-tête de différents niveaux", "materiel": "Casse-tête variés (encastrement, 12 pièces, 24 pièces, 50+ pièces), surface plane", "duree": "Variable (15-45 min)", "competence": "Concentration et résolution de problèmes", "adaptations": "1- Encastrement en bois pour Émergence. 2- Casse-tête avec image d'intérêt spécifique. 3- Peut devenir un projet sur plusieurs temps libres.", "style": "Temps libres", "style_norm": "Temps libres", "saison": "Toutes", "saison_norm": "Toutes", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "½ période", "competence_norm": "Concentration"}, {"nom": "Bulle de calme", "description": "Créer un petit espace de retrait sensoriel avec couvertures, coussins et lumières tamisées. Le campeur peut s'y reposer, écouter de la musique avec des écouteurs, manipuler des objets fidget ou simplement souffler. Le moniteur reste à proximité en respectant l'espace du campeur.", "lieu": "Intérieur Boubou", "application": "Individuel", "autonomie": "Tous", "preparation": "Aménager un coin calme (peut être permanent)", "materiel": "Couvertures, coussins, lumières tamisées ou guirlandes, écouteurs, musique douce, objets fidget", "duree": "Variable (selon le besoin)", "competence": "Autorégulation et conscience de soi", "adaptations": "1- Certains campeurs aiment la pression (couverture lourde). 2- D'autres préfèrent un espace ouvert mais calme. 3- Respecter le signal du campeur quand il est prêt à revenir.", "style": "Temps libres", "style_norm": "Temps libres", "saison": "Toutes", "saison_norm": "Toutes", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "½ période", "competence_norm": "Régulation & détente"}, {"nom": "Musique et écouteurs", "description": "Écouter la musique préférée du campeur avec des écouteurs ou un petit haut-parleur. On peut écouter en relaxant, danser doucement, suivre le rythme avec le corps, ou simplement fredonner ensemble. La musique est un excellent outil de connexion et de régulation pour les personnes autistes.", "lieu": "Intérieur Boubou", "application": "Individuel", "autonomie": "Tous", "preparation": "Avoir un appareil avec musique et écouteurs", "materiel": "Téléphone ou tablette, écouteurs ou haut-parleur, playlist", "duree": "Variable (10-30 min)", "competence": "Régulation sensorielle et expression", "adaptations": "1- Demander aux parents la musique préférée du campeur. 2- Certains campeurs ont besoin d'écouter la même chanson en boucle — c'est correct! 3- Casque antibruit si l'environnement est trop stimulant.", "style": "Temps libres", "style_norm": "Temps libres", "saison": "Toutes", "saison_norm": "Toutes", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "Courte (< 30 min)", "competence_norm": "Exploration sensorielle"}, {"nom": "Promenade sensorielle", "description": "Marcher sur le site en explorant avec les sens : toucher l'écorce des arbres, sentir les fleurs, écouter les oiseaux, observer les insectes. Le rythme est celui du campeur. On peut ramasser des trésors naturels en chemin.", "lieu": "Extérieur (tout le site)", "application": "Individuel", "autonomie": "Soutien partiel", "preparation": "Aucune", "materiel": "Petit sac pour ramasser des trésors (optionnel)", "duree": "Variable (15-30 min)", "competence": "Exploration sensorielle et lien avec la nature", "adaptations": "1- Pour les campeurs qui courent, définir un trajet clair avec des repères visuels. 2- Apporter un pictogramme de l'itinéraire si nécessaire. 3- Respecter les limites sensorielles (certains n'aiment pas toucher l'herbe, etc.).", "style": "Temps libres", "style_norm": "Temps libres", "saison": "Toutes", "saison_norm": "Toutes", "notes": "", "fiche": "", "lieu_norm": "Extérieur", "duree_norm": "Courte (< 30 min)", "competence_norm": "Exploration sensorielle"}, {"nom": "Bulles de savon", "description": "Souffler des bulles de savon de différentes tailles. Le campeur peut souffler lui-même, courir après les bulles pour les éclater, ou simplement les observer flotter. Activité visuellement captivante et apaisante.", "lieu": "Extérieur", "application": "Individuel", "autonomie": "Tous", "preparation": "Aucune", "materiel": "Solution à bulles, baguettes à bulles (petites et grandes)", "duree": "Variable (10-20 min)", "competence": "Poursuite visuelle et motricité orale", "adaptations": "1- Grandes baguettes pour des bulles géantes. 2- Si le campeur ne peut pas souffler, le moniteur fait les bulles et le campeur les éclate. 3- Parfait comme activité de transition.", "style": "Temps libres", "style_norm": "Temps libres", "saison": "Toutes", "saison_norm": "Toutes", "notes": "", "fiche": "", "lieu_norm": "Extérieur", "duree_norm": "Courte (< 30 min)", "competence_norm": "Autre"}, {"nom": "Jeux de ballon simples", "description": "Se lancer un ballon, le faire rouler au sol, le botter doucement, jouer au ballon-chasseur simplifié ou simplement le faire rebondir. L'interaction est au rythme du campeur, sans règles complexes.", "lieu": "Extérieur (tout le site)", "application": "Individuel", "autonomie": "Soutien partiel", "preparation": "Aucune", "materiel": "Ballon léger (pas trop dur), ballon de plage", "duree": "Variable (10-30 min)", "competence": "Coordination œil-main et interaction sociale", "adaptations": "1- Ballon de plage (léger et lent) pour les débutants. 2- Adapter la distance selon les capacités. 3- Certains campeurs préfèrent faire rouler plutôt que lancer.", "style": "Temps libres", "style_norm": "Temps libres", "saison": "Toutes", "saison_norm": "Toutes", "notes": "", "fiche": "", "lieu_norm": "Extérieur", "duree_norm": "Courte (< 30 min)", "competence_norm": "Habiletés sociales"}, {"nom": "Parcours moteur libre", "description": "Avec le matériel disponible (cônes, cerceaux, cordes), créer un petit parcours improviser. Le campeur peut grimper, ramper, sauter, slalomer. Le parcours peut être fait et refait — la répétition est rassurante et amusante.", "lieu": "Extérieur (tout le site)", "application": "Individuel", "autonomie": "Soutien partiel", "preparation": "Rassembler le matériel de parcours", "materiel": "Cônes, cerceaux, cordes, modules de jeu disponibles sur le site", "duree": "Variable (15-30 min)", "competence": "Motricité globale et planification motrice", "adaptations": "1- Adapter la difficulté au campeur. 2- On peut ajouter un défi (chrono, nouveau mouvement). 3- Le campeur peut aider à construire le parcours — c'est aussi une activité en soi!", "style": "Temps libres", "style_norm": "Temps libres", "saison": "Toutes", "saison_norm": "Toutes", "notes": "", "fiche": "", "lieu_norm": "Extérieur", "duree_norm": "Courte (< 30 min)", "competence_norm": "Motricité globale"}, {"nom": "Chasse aux trésors rapide", "description": "Le moniteur cache rapidement 5 à 10 petits objets dans un espace défini. Le campeur doit les retrouver. Peut aussi se faire avec des images à trouver dans la nature (trouve quelque chose de rouge, quelque chose de doux, etc.).", "lieu": "Extérieur (tout le site)", "application": "Individuel", "autonomie": "Soutien complet", "preparation": "Choisir et cacher les objets (2 min de préparation)", "materiel": "Petits objets colorés, ou liste visuelle de choses à trouver", "duree": "Variable (10-20 min)", "competence": "Observation et attention visuelle", "adaptations": "1- Pour Émergence, montrer l'objet identique avant pour que le campeur sache quoi chercher. 2- Zone plus petite pour faciliter la réussite. 3- Féliciter chaque trouvaille!", "style": "Temps libres", "style_norm": "Temps libres", "saison": "Toutes", "saison_norm": "Toutes", "notes": "", "fiche": "", "lieu_norm": "Extérieur", "duree_norm": "Courte (< 30 min)", "competence_norm": "Observation & science"}, {"nom": "Jeux de société adaptés", "description": "Jouer à des jeux de société simples : jeux de mémoire (Memory), Uno, jeux de dominos, Dobble, ou jeux de l'oie simplifiés. Le moniteur adapte les règles au besoin (moins de cartes, pas de compétition, tours assistés).", "lieu": "Intérieur Boubou", "application": "Individuel", "autonomie": "Soutien complet", "preparation": "Avoir une sélection de jeux accessibles", "materiel": "Jeux de société variés (Memory, Uno, Dobble, dominos, jeux d'encastrement)", "duree": "Variable (15-45 min)", "competence": "Tour de rôle et interaction sociale", "adaptations": "1- Simplifier les règles (jouer ouvert, pas de gagnant/perdant). 2- Utiliser un timer visuel pour les tours. 3- Commencer avec le jeu préféré du campeur pour créer l'engagement.", "style": "Temps libres", "style_norm": "Temps libres", "saison": "Toutes", "saison_norm": "Toutes", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "½ période", "competence_norm": "Habiletés sociales"}, {"nom": "Pâte à modeler libre", "description": "Manipuler de la pâte à modeler sans objectif précis : rouler, écraser, étirer, faire des serpentins, des boules, des formes. L'activité est sensorielle et apaisante. Le moniteur peut modeler à côté et inspirer par l'exemple.", "lieu": "Intérieur Boubou", "application": "Individuel", "autonomie": "Tous", "preparation": "Sortir la pâte à modeler et les outils", "materiel": "Pâte à modeler, outils de modelage (rouleaux, emporte-pièces, couteaux en plastique)", "duree": "Variable (15-30 min)", "competence": "Exploration sensorielle et motricité fine", "adaptations": "1- Certains campeurs n'aiment pas la texture — proposer de la pâte avec des gants. 2- Le sable kinétique est une bonne alternative. 3- On peut intégrer les intérêts du campeur (former des trains, des lettres, etc.).", "style": "Temps libres", "style_norm": "Temps libres", "saison": "Toutes", "saison_norm": "Toutes", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "Courte (< 30 min)", "competence_norm": "Motricité fine & sensoriel"}, {"nom": "Objets fidget et sensoriel", "description": "Explorer une boîte d'objets sensoriels et fidget : balles texturées, tangle, Pop-It, sablier liquide, tubes sensoriels, balles anti-stress, slime. Le campeur choisit ce qui l'attire et manipule librement.", "lieu": "Intérieur Boubou", "application": "Individuel", "autonomie": "Tous", "preparation": "Préparer la boîte d'objets sensoriels", "materiel": "Boîte contenant : Pop-It, tangle, balles texturées, sablier liquide, slime, balles anti-stress, tubes sensoriels", "duree": "Variable (selon le besoin)", "competence": "Autorégulation sensorielle", "adaptations": "1- Observer quel type de stimulation le campeur recherche (pression, visuel, toucher léger). 2- Certains objets peuvent devenir des outils de régulation tout au long du séjour. 3- Laisser le campeur explorer sans diriger.", "style": "Temps libres", "style_norm": "Temps libres", "saison": "Toutes", "saison_norm": "Toutes", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "½ période", "competence_norm": "Exploration sensorielle"}, {"nom": "Construction libre (Lego, blocs)", "description": "Construire librement avec des blocs Lego, Duplo, Mega Bloks ou des blocs de bois. Le campeur peut suivre un modèle, reproduire un intérêt (train, maison, fusée) ou créer sans plan. Le moniteur peut construire à côté ou aider.", "lieu": "Intérieur Boubou", "application": "Individuel", "autonomie": "Soutien partiel", "preparation": "Sortir les blocs", "materiel": "Blocs Lego, Duplo ou Mega Bloks, blocs de bois, plaque de base", "duree": "Variable (15-45 min)", "competence": "Créativité et motricité fine", "adaptations": "1- Duplo ou Mega Bloks pour motricité réduite. 2- Construire en lien avec l'intérêt spécifique (si le campeur aime les trains, construire une gare). 3- On peut prendre une photo de la création pour la valoriser.", "style": "Temps libres", "style_norm": "Temps libres", "saison": "Toutes", "saison_norm": "Toutes", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "½ période", "competence_norm": "Motricité fine"}, {"nom": "Tableau magnétique ou de feutrine", "description": "Créer des scènes sur un tableau magnétique ou de feutrine avec des personnages, des animaux, des formes. Le campeur peut raconter une histoire, reproduire une scène ou simplement explorer le matériel.", "lieu": "Intérieur Boubou", "application": "Individuel", "autonomie": "Soutien complet", "preparation": "Sortir le tableau et les pièces", "materiel": "Tableau magnétique ou de feutrine, pièces aimantées ou en feutrine (personnages, animaux, formes, lettres)", "duree": "Variable (10-30 min)", "competence": "Créativité et langage", "adaptations": "1- Peut être utilisé comme support de communication. 2- Idéal pour les campeurs qui aiment classer et organiser. 3- On peut aussi travailler les couleurs, les chiffres ou les lettres de façon ludique.", "style": "Temps libres", "style_norm": "Temps libres", "saison": "Toutes", "saison_norm": "Toutes", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "Courte (< 30 min)", "competence_norm": "Créativité"}, {"nom": "Activité tablette guidée", "description": "Utiliser une tablette avec des applications éducatives ou sensorielles adaptées. Le moniteur guide l'utilisation et limite le temps. Applications de dessin, de musique, de cause-effet, ou jeux éducatifs simples.", "lieu": "Intérieur Boubou", "application": "Individuel", "autonomie": "Soutien complet", "preparation": "Charger la tablette, préparer les applications", "materiel": "Tablette avec applications adaptées, casque d'écoute", "duree": "Variable (10-20 min, avec timer visuel)", "competence": "Cause-effet et autonomie", "adaptations": "1- Utiliser un timer visuel pour cadrer la durée. 2- Préparer la transition de fin avec un support visuel. 3- Choisir des apps sensorielles (Baby Sensory, Cause and Effect) pour Émergence.", "style": "Temps libres", "style_norm": "Temps libres", "saison": "Toutes", "saison_norm": "Toutes", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "Courte (< 30 min)", "competence_norm": "Autonomie & cuisine"}, {"nom": "Jeu de rôle avec figurines", "description": "Jouer avec des figurines, des petites voitures, des animaux en plastique ou des personnages. Le moniteur peut initier un scénario simple et laisser le campeur prendre la direction du jeu. Excellent pour pratiquer le langage et l'imagination.", "lieu": "Intérieur Boubou", "application": "Individuel", "autonomie": "Soutien complet", "preparation": "Sortir les figurines et le décor", "materiel": "Figurines, petites voitures, animaux en plastique, décor improvisé (boîtes, tissus)", "duree": "Variable (15-30 min)", "competence": "Jeu symbolique et communication", "adaptations": "1- Suivre le lead du campeur même si le jeu est répétitif. 2- Narrer ce qui se passe pour stimuler le langage. 3- Utiliser les intérêts spécifiques comme point d'entrée.", "style": "Temps libres", "style_norm": "Temps libres", "saison": "Toutes", "saison_norm": "Toutes", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "Courte (< 30 min)", "competence_norm": "Expression & communication"}, {"nom": "Album photo et souvenirs", "description": "Regarder ensemble des photos du camp (activités, amis, moments drôles) sur une tablette ou imprimées. Nommer les personnes, raconter ce qui s'est passé. Excellent pour travailler la mémoire, le langage et les émotions.", "lieu": "Intérieur Boubou", "application": "Individuel", "autonomie": "Soutien partiel", "preparation": "Avoir des photos récentes du campeur au camp", "materiel": "Tablette avec photos ou photos imprimées", "duree": "Variable (10-20 min)", "competence": "Mémoire et communication", "adaptations": "1- Certains campeurs adorent se voir en photo. 2- Peut servir de préparation au retour à la maison. 3- On peut imprimer les favorites pour le journal de campeur.", "style": "Temps libres", "style_norm": "Temps libres", "saison": "Toutes", "saison_norm": "Toutes", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "Courte (< 30 min)", "competence_norm": "Expression & communication"}, {"nom": "Marionnettes et toutous", "description": "Utiliser des marionnettes ou des toutous pour interagir avec le campeur. Le moniteur fait parler la marionnette — parfois un campeur qui refuse de communiquer avec un adulte va parler à une marionnette! Le toutou peut aussi être un compagnon réconfortant.", "lieu": "Intérieur Boubou", "application": "Individuel", "autonomie": "Soutien partiel", "preparation": "Avoir des marionnettes ou toutous disponibles", "materiel": "Marionnettes, toutous, peluches", "duree": "Variable (10-30 min)", "competence": "Communication et expression des émotions", "adaptations": "1- La marionnette peut devenir un outil de médiation tout au long du séjour. 2- Le campeur peut apporter son toutou de la maison. 3- Pour les campeurs non-verbaux, la marionnette ajoute un support visuel à la communication.", "style": "Temps libres", "style_norm": "Temps libres", "saison": "Toutes", "saison_norm": "Toutes", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "Courte (< 30 min)", "competence_norm": "Expression & communication"}, {"nom": "Jeu de cache-cache adapté", "description": "Jouer à cache-cache en version simplifiée : le moniteur se cache dans des endroits faciles à trouver et le campeur cherche (ou l'inverse). On peut aussi faire coucou avec un drap. L'anticipation et la surprise sont très motivantes.", "lieu": "Intérieur Boubou", "application": "Individuel", "autonomie": "Soutien partiel", "preparation": "Aucune", "materiel": "Aucun (drap ou couverture optionnel)", "duree": "Variable (10-20 min)", "competence": "Interaction sociale et anticipation", "adaptations": "1- Pour Émergence, laisser dépasser une partie du corps pour faciliter. 2- Toujours dans un espace sécurisé et délimité. 3- Le jeu de coucou-caché peut suffire pour certains campeurs.", "style": "Temps libres", "style_norm": "Temps libres", "saison": "Toutes", "saison_norm": "Toutes", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "Courte (< 30 min)", "competence_norm": "Habiletés sociales"}, {"nom": "Imitation réciproque", "description": "Le moniteur imite les gestes, sons ou mouvements du campeur, puis invite le campeur à l'imiter en retour. Commencer par suivre le lead du campeur est une technique puissante pour créer le contact avec les personnes autistes. Progressivement ajouter des variations.", "lieu": "Intérieur Boubou", "application": "Individuel", "autonomie": "Soutien partiel", "preparation": "Aucune", "materiel": "Aucun (miroir optionnel)", "duree": "Variable (5-15 min)", "competence": "Attention conjointe et interaction sociale", "adaptations": "1- Technique particulièrement efficace avec les campeurs moins verbaux. 2- Ne pas forcer l'imitation en retour. 3- Utiliser un miroir peut ajouter une dimension visuelle intéressante.", "style": "Temps libres", "style_norm": "Temps libres", "saison": "Toutes", "saison_norm": "Toutes", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "Variable", "competence_norm": "Habiletés sociales"}, {"nom": "Comptines et chansons à gestes", "description": "Chanter des comptines accompagnées de gestes (Tête épaules genoux orteils, Bateau sur l'eau, Les petits poissons...). Les gestes offrent un support visuel et la répétition est rassurante. Le campeur peut participer au niveau qu'il souhaite.", "lieu": "Intérieur Boubou", "application": "Individuel", "autonomie": "Soutien partiel", "preparation": "Connaître les comptines", "materiel": "Aucun (support visuel des paroles optionnel)", "duree": "Variable (10-20 min)", "competence": "Langage et motricité", "adaptations": "1- Commencer par les comptines connues du campeur (demander aux parents). 2- Pour les campeurs non-verbaux, les gestes seuls sont une participation valide. 3- Ajouter des instruments simples (maracas, tambourin).", "style": "Temps libres", "style_norm": "Temps libres", "saison": "Toutes", "saison_norm": "Toutes", "notes": "", "fiche": "", "lieu_norm": "Intérieur", "duree_norm": "Courte (< 30 min)", "competence_norm": "Expression & communication"}, {"nom": "Jeu d'eau libre", "description": "Explorer l'eau avec des contenants, des entonnoirs, des éponges, des jouets qui flottent. Transvider, function getColor(style) {
  return STYLE_COLORS[style] || { bg: '#636e72', light: '#F0EDE1' };
}

// Build filters — exclude "Tous"/"Toutes" values (covered by default option)
const WILDCARD = ['Tous', 'Toutes', 'Autre'];
const saisons = [...new Set(ACTIVITIES.map(a => a.saison_norm))].filter(v => !WILDCARD.includes(v)).sort();
const styles  = [...new Set(ACTIVITIES.map(a => a.style_norm).filter(Boolean))].sort();
const autonomies = [...new Set(ACTIVITIES.map(a => a.autonomie).filter(Boolean))].filter(v => !WILDCARD.includes(v));
const AUTONOMIE_ORDER = ['Soutien complet', 'Soutien partiel', 'Semi-autonome'];
autonomies.sort((a, b) => AUTONOMIE_ORDER.indexOf(a) - AUTONOMIE_ORDER.indexOf(b));
const lieux = [...new Set(ACTIVITIES.map(a => a.lieu_norm).filter(Boolean))].filter(v => v !== 'Intérieur ou extérieur').sort();
const durees = [...new Set(ACTIVITIES.map(a => a.duree_norm).filter(Boolean))];
const DUREE_ORDER = ['Courte (< 30 min)', '½ période', '½ à 1 période', '1 période', '1-2 périodes', 'Variable'];
durees.sort((a, b) => DUREE_ORDER.indexOf(a) - DUREE_ORDER.indexOf(b));
const competences = [...new Set(ACTIVITIES.map(a => a.competence_norm).filter(Boolean))].filter(v => !WILDCARD.includes(v)).sort();

const fSaison = document.getElementById('filterSaison');
const fStyle  = document.getElementById('filterStyle');
const fAutonomie = document.getElementById('filterAutonomie');
const fLieu   = document.getElementById('filterLieu');
const fDuree  = document.getElementById('filterDuree');
const fCompetence = document.getElementById('filterCompetence');

function addOpts(sel, arr, iconMap) {
  arr.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = (iconMap && iconMap[s] || '') + (iconMap ? ' ' : '') + s; sel.appendChild(o); });
}
addOpts(fSaison, saisons, SAISON_ICONS);
addOpts(fStyle, styles);
addOpts(fAutonomie, autonomies);
addOpts(fLieu, lieux);
addOpts(fDuree, durees);
addOpts(fCompetence, competences);

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function renderCards(list) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('visibleCount').textContent = list.length;

  if (!list.length) {
    grid.innerHTML = '<div class="no-results">Aucune activit\u00e9 trouv\u00e9e avec ces filtres.</div>';
    return;
  }

  list.forEach(a => {
    const c = getColor(a.style_norm);
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openModal(a);
    const tapeLeft = 14 + Math.floor(Math.random() * 25);
    const tapeW = 40 + Math.floor(Math.random() * 25);
    const tapeRot = (-2 + Math.random() * 4).toFixed(1);
    card.innerHTML = `
      <div class="card-tape" style="background:${c.light};left:${tapeLeft}px;width:${tapeW}px;transform:rotate(${tapeRot}deg)"></div>
      <div class="card-body">
        <div class="card-tags">
          <span class="tag tag-saison">${SAISON_ICONS[a.saison_norm]||''} ${a.saison_norm}</span>
          <span class="tag tag-style" style="background:${c.light}">${esc(a.style_norm)}</span>
          ${a.autonomie && a.autonomie !== 'Tous' ? `<span class="tag tag-autonomie">${esc(a.autonomie)}</span>` : ''}
        </div>
        <h3>${esc(a.nom)}</h3>
        <p class="card-desc">${esc(a.description)}</p>
        <div class="card-meta">
          ${a.duree ? `<span>\u23F1 ${esc(a.duree)}</span>` : ''}
          ${a.lieu ? `<span>\u{1F4CD} ${esc(a.lieu)}</span>` : ''}
          ${a.application ? `<span>\u{1F465} ${esc(a.application)}</span>` : ''}
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function openModal(a) {
  const c = getColor(a.style_norm);
  document.getElementById('modalAccent').style.background = c.bg;
  const sections = [
    { t: 'Description', v: a.description },
    { t: 'Pr\u00e9paration', v: a.preparation },
    { t: 'Mat\u00e9riel requis', v: a.materiel },
    { t: 'Dur\u00e9e', v: a.duree },
    { t: 'Application', v: a.application },
    { t: "Niveau d'autonomie", v: a.autonomie },
    { t: 'Comp\u00e9tence transversale', v: a.competence },
    { t: 'Adaptations', v: a.adaptations },
    { t: 'Notes et commentaires', v: a.notes },
    { t: 'Fiche th\u00e9matique', v: a.fiche },
  ].filter(s => s.v);

  document.getElementById('modalContent').innerHTML = `
    <div class="card-tags" style="margin-bottom:.6rem">
      <span class="tag tag-saison">${SAISON_ICONS[a.saison_norm]||''} ${a.saison_norm}</span>
      <span class="tag tag-style" style="background:${c.light}">${esc(a.style_norm)}</span>
      ${a.autonomie ? `<span class="tag tag-autonomie">${esc(a.autonomie)}</span>` : ''}
      ${a.lieu_norm ? `<span class="tag tag-lieu">${esc(a.lieu_norm)}</span>` : ''}
      ${a.duree_norm ? `<span class="tag tag-duree">${esc(a.duree_norm)}</span>` : ''}
      ${a.competence_norm && a.competence_norm !== 'Autre' ? `<span class="tag tag-comp">${esc(a.competence_norm)}</span>` : ''}
    </div>
    <h2>${esc(a.nom)}</h2>
    ${sections.map(s => `<div class="modal-section"><h4>${s.t}</h4><p>${esc(s.v)}</p></div>`).join('')}
  `;
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

document.getElementById('modalClose').onclick = closeModal;
document.getElementById('modalOverlay').onclick = e => { if (e.target === e.currentTarget) closeModal(); };
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const s = fSaison.value, st = fStyle.value, auto = fAutonomie.value;
  const li = fLieu.value, du = fDuree.value, co = fCompetence.value;
  const WC = ['Tous', 'Toutes', 'Autre'];
  const filtered = ACTIVITIES.filter(a => {
    if (s && a.saison_norm !== s) return false;
    if (st && a.style_norm !== st) return false;
    if (auto && a.autonomie !== auto && !WC.includes(a.autonomie)) return false;
    if (li && a.lieu_norm !== li && a.lieu_norm !== 'Intérieur ou extérieur') return false;
    if (du && a.duree_norm !== du) return false;
    if (co && a.competence_norm !== co && !WC.includes(a.competence_norm)) return false;
    if (q) {
      const hay = [a.nom, a.description, a.materiel, a.preparation, a.adaptations, a.style, a.lieu, a.competence, a.autonomie].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  renderCards(filtered);
}

[fSaison, fStyle, fAutonomie, fLieu, fDuree, fCompetence].forEach(el => el.addEventListener('change', applyFilters));
document.getElementById('searchInput').addEventListener('input', applyFilters);

renderCards(ACTIVITIES);
</script>
</body>
</html>
